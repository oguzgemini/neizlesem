<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Ne İzlesem? | Akıllı Film Danışmanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff; margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .header-bar {
            width: 100%; max-width: 800px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }
        
        .header-bar h1 { margin: 0; font-size: 24px; color: #01b4e4; }
        
        .btn-watchlist-toggle {
            background: #e50914; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-watchlist-toggle:hover { background: #b20710; }

        .search-container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center; width: 100%; max-width: 500px; margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .direct-search-box {
            display: flex; gap: 10px; margin-bottom: 25px;
            padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .direct-search-box input { flex-grow: 1; }
        .btn-search {
            background: #01b4e4; color: white; border: none; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        .mood-container {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .btn-mood {
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .btn-mood:hover { background: #01b4e4; border-color: #01b4e4; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        #ratingValue { color: #01b4e4; font-weight: bold; }

        select, input[type="text"], input[type="number"] {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background: rgba(255, 255, 255, 0.9); color: #333; font-family: 'Poppins', sans-serif;
            box-sizing: border-box; outline: none;
        }
        input[type="range"] { width: 100%; accent-color: #01b4e4; cursor: pointer; }

        .btn-primary {
            background: linear-gradient(90deg, #01b4e4 0%, #0d253f 100%);
            color: white; border: none; padding: 12px 20px; width: 100%;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 15px;
        }

        #results { width: 100%; max-width: 800px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { #results { grid-template-columns: 1fr 1fr; } }

        .movie-card {
            background: rgba(255, 255, 255, 0.05); border-radius: 12px;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .movie-poster { width: 100%; height: 350px; object-fit: cover; object-position: top; }
        .movie-content { padding: 20px; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        
        .movie-title { margin: 0 0 10px 0; font-size: 18px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .movie-rating { background: #e50914; padding: 4px 8px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .movie-overview { font-size: 13px; color: #bbb; line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        .providers-container { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; min-height: 30px; }
        .providers-container img { width: 30px; height: 30px; border-radius: 5px; }

        .action-buttons { display: flex; gap: 10px; margin-top: auto; flex-wrap: wrap; }
        .btn-action {
            flex: 1; padding: 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
            display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; color: white; text-decoration: none;
        }
        .btn-youtube { background-color: #ff0000; }
        .btn-similar { background-color: #01b4e4; }
        .btn-add-list { background-color: #4CAF50; width: 100%; margin-top: 10px; }
        .btn-remove-list { background-color: #d9534f; width: 100%; margin-top: 10px; }

        .section-title { grid-column: 1 / -1; text-align: center; color: #01b4e4; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1>🎬 Ne İzlesem?</h1>
        <button class="btn-watchlist-toggle" onclick="showWatchlist()">📌 İzleme Listem</button>
    </div>

    <div class="search-container" id="searchSection">
        
        <div class="direct-search-box">
            <input type="text" id="searchInput" placeholder="Örn: Inception, Matrix...">
            <button class="btn-search" onclick="searchByName()">Ara</button>
        </div>

        <p style="color: #aaa; font-size: 14px; margin-bottom: 15px;">Veya filtreleri kullanarak yeni filmler keşfet:</p>
        
        <div class="mood-container">
            <button class="btn-mood" onclick="setMood('kafa_dagitmalik')">🤪 Kafa Dağıtmalık</button>
            <button class="btn-mood" onclick="setMood('beyin_yakan')">🤯 Beyin Yakanlar</button>
            <button class="btn-mood" onclick="setMood('kaliteli_dram')">🎭 Kaliteli Dram</button>
            <button class="btn-mood" onclick="setMood('korku_gecesi')">👻 Korku Gecesi</button>
        </div>

        <div class="input-group">
            <label for="genre"><span>Film Türü:</span></label>
            <select id="genre">
                <option value="28">Aksiyon</option>
                <option value="878">Bilim Kurgu</option>
                <option value="18">Dram</option>
                <option value="53">Gerilim</option>
                <option value="35">Komedi</option>
                <option value="27">Korku</option>
                <option value="10749">Romantik</option>
            </select>
        </div>
        <div class="input-group">
            <label for="year"><span>Çıkış Yılı:</span></label>
            <input type="number" id="year" value="2014">
        </div>
        <div class="input-group">
            <label for="rating"><span>Min. IMDb Puanı:</span> <span id="ratingValue">7.0</span></label>
            <input type="range" id="rating" min="0" max="10" step="0.5" value="7.0" oninput="document.getElementById('ratingValue').innerText = this.value">
        </div>

        <button class="btn-primary" onclick="getMovies()">Bana Film Öner!</button>
    </div>

    <div id="results"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Senin Firebase Bilgilerin
        const firebaseConfig = {
            apiKey: "AIzaSyCgZUjN5VzN-z16ENQK-lDvLOZ8TXWAe4o",
            authDomain: "ne-izlesem-app-58868.firebaseapp.com",
            projectId: "ne-izlesem-app-58868",
            storageBucket: "ne-izlesem-app-58868.firebasestorage.app",
            messagingSenderId: "845923520501",
            appId: "1:845923520501:web:fc8af7892227034c4f5abc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // TMDB Bilgilerin
        const API_KEY = 'd0101ce0dec20d3b12853cabffd10e74';
        const GosterilecekFilmSayisi = 6;
        let currentDisplayedMovies = [];

        // FİREBASE VERİTABANI İŞLEMLERİ
        window.addToWatchlist = async function(movieId) {
            const movie = currentDisplayedMovies.find(m => m.id === movieId);
            if (!movie) return;

            try {
                const q = query(collection(db, "watchlist"), where("id", "==", movieId));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    alert("Bu film zaten listende var.");
                    return;
                }

                await addDoc(collection(db, "watchlist"), {
                    id: movie.id,
                    title: movie.title,
                    poster_path: movie.poster_path,
                    vote_average: movie.vote_average,
                    overview: movie.overview,
                    addedAt: new Date()
                });
                alert(`"${movie.title}" listene eklendi! 🍿`);
                
            } catch (e) {
                console.error("Listeye eklerken hata oluştu: ", e);
                alert("Veritabanına eklenirken bir hata oluştu.");
            }
        }

        window.removeFromWatchlist = async function(movieId) {
            try {
                const q = query(collection(db, "watchlist"), where("id", "==", movieId));
                const querySnapshot = await getDocs(q);

                querySnapshot.forEach(async (document) => {
                    await deleteDoc(doc(db, "watchlist", document.id));
                });

                window.showWatchlist(); 
            } catch (e) {
                console.error("Listeden silinirken hata oluştu: ", e);
            }
        }

        window.showWatchlist = async function() {
            document.getElementById('searchSection').style.display = 'none'; 
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<div class='section-title'>Listen buluttan getiriliyor... ☁️</div>";

            try {
                const querySnapshot = await getDocs(collection(db, "watchlist"));
                const list = [];
                querySnapshot.forEach((doc) => {
                    list.push(doc.data());
                });

                let header = `<div class="header-bar" style="grid-column: 1 / -1;">
                                <h2 style="color:#e50914; margin:0;">📌 İzleme Listem</h2>
                                <button class="btn-primary" style="width:auto; margin:0;" onclick="location.reload()">Aramaya Dön</button>
                              </div>`;
                
                if (list.length === 0) {
                    resultsDiv.innerHTML = header + "<p style='text-align:center; width:100%; grid-column: 1 / -1;'>Listen henüz boş. Hemen yeni filmler keşfet!</p>";
                } else {
                    window.renderMoviesToDOM(list, "", true); 
                    document.getElementById('results').insertAdjacentHTML('afterbegin', header);
                }
            } catch (e) {
                console.error("Liste çekilirken hata oluştu: ", e);
                resultsDiv.innerHTML = "<div class='section-title' style='color:red;'>Liste alınamadı. Lütfen Firebase veritabanınızın açık olduğundan emin olun.</div>";
            }
        }

        // TMDB ARAMA VE FİLTRELEME İŞLEMLERİ
        window.searchByName = async function() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;

            document.getElementById('results').innerHTML = "<div class='section-title'>Aranıyor... 🚀</div>";
            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=tr-TR`);
                const data = await response.json();
                window.renderMoviesToDOM(data.results.slice(0, GosterilecekFilmSayisi), `🔍 '${query}' Arama Sonuçları`);
            } catch (err) { console.error(err); }
        }

        window.setMood = function(mood) {
            const genreSelect = document.getElementById('genre');
            const yearInput = document.getElementById('year');
            const ratingInput = document.getElementById('rating');
            yearInput.value = Math.floor(Math.random() * (2023 - 2010 + 1)) + 2010;

            if (mood === 'kafa_dagitmalik') { genreSelect.value = "35"; ratingInput.value = "6.0"; }
            else if (mood === 'beyin_yakan') { genreSelect.value = "878"; ratingInput.value = "7.5"; }
            else if (mood === 'kaliteli_dram') { genreSelect.value = "18"; ratingInput.value = "8.0"; }
            else if (mood === 'korku_gecesi') { genreSelect.value = "27"; ratingInput.value = "6.5"; }
            
            document.getElementById('ratingValue').innerText = ratingInput.value;
            window.getMovies();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        window.getMovies = async function() {
            const genreId = document.getElementById('genre').value;
            const year = document.getElementById('year').value;
            const minRating = document.getElementById('rating').value; 
            
            document.getElementById('results').innerHTML = "<div class='section-title'>Filmler taranıyor... 🚀</div>";
            const baseUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&primary_release_year=${year}&vote_average.gte=${minRating}&vote_count.gte=100&language=tr-TR`;
            
            try {
                const initResponse = await fetch(baseUrl);
                const initData = await initResponse.json();
                if (initData.results.length === 0) return window.renderMoviesToDOM([]);

                const totalPages = Math.min(initData.total_pages, 500);
                const randomPage = Math.floor(Math.random() * totalPages) + 1;
                
                let moviesData = initData.results;
                if (randomPage > 1) {
                    const pageResponse = await fetch(`${baseUrl}&page=${randomPage}`);
                    const pageData = await pageResponse.json();
                    moviesData = pageData.results;
                }

                const selectedMovies = shuffleArray(moviesData).slice(0, GosterilecekFilmSayisi);
                window.renderMoviesToDOM(selectedMovies, "🍿 Senin İçin Seçilen Filmler");
            } catch (error) { console.error(error); }
        }

        window.getSimilarMovies = async function(movieId, movieName) {
            document.getElementById('results').innerHTML = `<div class='section-title'>'${movieName}' benzerleri aranıyor... 🪄</div>`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            try {
                const response = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/similar?api_key=${API_KEY}&language=tr-TR&page=1`);
                const data = await response.json();
                window.renderMoviesToDOM(data.results.slice(0, GosterilecekFilmSayisi), `✨ '${movieName}' Sevenler Bunları da Sevdi`);
            } catch (error) { console.error(error); }
        }

        window.renderMoviesToDOM = async function(movies, headerText = "", isWatchlistMode = false) {
            currentDisplayedMovies = movies; 
            const resultsDiv = document.getElementById('results');
            
            // Eğer isWatchlistMode içindeysek headerText dışarıdan verilecek, o yüzden burayı eziyoruz
            if(!isWatchlistMode) {
                resultsDiv.innerHTML = headerText ? `<h2 class="section-title">${headerText}</h2>` : ""; 
            } else {
                resultsDiv.innerHTML = "";
            }

            if (movies.length === 0 && !isWatchlistMode) {
                resultsDiv.innerHTML = "<div class='section-title'>Bu kriterlere uygun film bulamadık.</div>";
                return;
            }

            for (const movie of movies) {
                let trailerLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(movie.title + ' trailer')}`;
                let providersHTML = `<span style="font-size:11px; color:#aaa;">Platform bilgisi yok</span>`;
                
                try {
                    const videoRes = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/videos?api_key=${API_KEY}`);
                    const videoData = await videoRes.json();
                    const trailer = videoData.results?.find(v => v.site === 'YouTube' && v.type === 'Trailer');
                    if (trailer) trailerLink = `https://www.youtube.com/watch?v=${trailer.key}`;

                    const provRes = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/watch/providers?api_key=${API_KEY}`);
                    const provData = await provRes.json();
                    const trProviders = provData.results?.TR?.flatrate;
                    if (trProviders && trProviders.length > 0) {
                        providersHTML = "";
                        trProviders.slice(0, 3).forEach(prov => {
                            providersHTML += `<img src="https://image.tmdb.org/t/p/original${prov.logo_path}" title="${prov.provider_name}" alt="${prov.provider_name}">`;
                        });
                    }
                } catch (err) {}

                const posterPath = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/400x600?text=Afiş+Yok';
                const overview = movie.overview ? movie.overview : "Bu film için özet bulunmuyor.";

                const listButton = isWatchlistMode 
                    ? `<button onclick="removeFromWatchlist(${movie.id})" class="btn-action btn-remove-list">❌ Listeden Çıkar</button>`
                    : `<button onclick="addToWatchlist(${movie.id})" class="btn-action btn-add-list">➕ Listeye Ekle</button>`;

                const movieHTML = `
                    <div class="movie-card">
                        <img src="${posterPath}" alt="${movie.title}" class="movie-poster">
                        <div class="movie-content">
                            <div>
                                <h3 class="movie-title">${movie.title} <span class="movie-rating">⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A'}</span></h3>
                                <div class="providers-container">${providersHTML}</div>
                                <p class="movie-overview">${overview}</p>
                            </div>
                            <div class="action-buttons">
                                <a href="${trailerLink}" target="_blank" class="btn-action btn-youtube">▶ Fragman</a>
                                <button onclick="getSimilarMovies(${movie.id}, '${movie.title.replace(/'/g, "\\'")}')" class="btn-action btn-similar">🔍 Benzerleri</button>
                                ${listButton}
                            </div>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML += movieHTML;
            }
        }
    </script>
</body>
</html>
