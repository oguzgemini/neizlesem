<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Ne İzlesem? | Premium Film Kütüphanem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #01b4e4;
            --secondary-color: #90cea1;
            --accent-color: #e50914;
            --bg-dark: #0d1117;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark);
            background-size: cover; background-position: center;
            filter: blur(20px) brightness(0.2); z-index: -1;
            transition: background-image 1s ease;
        }

        body {
            font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding: 20px;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg-dark);
        }

        /* Navigasyon & Header */
        .header-bar {
            width: 100%; max-width: 1000px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 30px; padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo { font-size: 28px; font-weight: 600; color: var(--primary-color); cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        
        .user-nav { display: flex; gap: 15px; align-items: center; }
        
        /* Modern Butonlar */
        .btn {
            border: none; padding: 10px 18px; border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-dice { background: #f39c12; color: white; }
        .btn-list { background: var(--card-bg); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-auth { background: white; color: #333; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Arama Kutusu Gelişmiş Tasarım */
        .search-container {
            background: var(--card-bg); backdrop-filter: blur(15px);
            padding: 35px; border-radius: 24px; width: 100%; max-width: 600px;
            margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .direct-search-box { display: flex; background: rgba(255,255,255,0.1); border-radius: 15px; padding: 5px; margin-bottom: 25px; }
        .direct-search-box input { background: transparent; border: none; color: white; padding: 12px; flex: 1; outline: none; }
        .btn-search { background: var(--primary-color); border-radius: 12px; color: white; padding: 0 20px; border: none; cursor: pointer; }

        /* Kart Tasarımı (Netflix Style) */
        #results { width: 100%; max-width: 1100px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        .movie-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; position: relative;
        }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary-color); box-shadow: 0 15px 30px rgba(1, 180, 228, 0.2); }

        .movie-poster-container { position: relative; height: 400px; overflow: hidden; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .movie-card:hover .movie-poster { scale: 1.1; }

        /* Kart Üstü Bilgiler */
        .rating-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); padding: 5px 10px; border-radius: 8px; font-weight: bold; color: #ffbc00; }
        .status-badge { position: absolute; top: 15px; left: 15px; padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-watched { background: var(--secondary-color); color: #000; }

        .movie-content { padding: 20px; }
        .movie-title { margin: 0 0 10px 0; font-size: 19px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-overview { font-size: 13px; color: #aaa; height: 60px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; margin-bottom: 20px; }

        /* Puanlama Sistemi (YENİ) */
        .user-rating-box { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .user-rating-box input { width: 50px; background: transparent; border: 1px solid var(--primary-color); color: white; border-radius: 5px; text-align: center; }

        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sm { padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; color: white; text-align: center; text-decoration: none; }
        .bg-red { background: var(--accent-color); }
        .bg-blue { background: var(--primary-color); }
        .bg-green { background: #27ae60; }
        .btn-full { grid-column: 1 / -1; margin-top: 5px; }

        /* Filtre Alanı Şıklığı */
        .mood-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        select, input[type="number"] { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 10px; width: 100%; outline: none; }
        
        .welcome-msg { font-size: 13px; color: var(--primary-color); margin-right: 10px; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div class="header-bar">
        <a href="#" class="logo" onclick="location.reload()">🎬 Ne İzlesem?</a>
        <div class="user-nav">
            <span id="user-welcome" class="welcome-msg"></span>
            <button class="btn btn-dice" onclick="getRandomMovie()"><i class="fa-solid fa-dice"></i> Rastgele</button>
            <button class="btn btn-list" onclick="showWatchlist()"><i class="fa-solid fa-bookmark"></i> Listem</button>
            <button id="auth-btn" class="btn btn-auth" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <div class="search-container" id="searchSection">
        <div class="direct-search-box">
            <input type="text" id="searchInput" placeholder="Film, dizi veya oyuncu ara...">
            <button class="btn-search" onclick="searchByName()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        
        <div class="mood-container">
            <button class="btn-mood btn" onclick="setMood('kafa_dagitmalik')">🤪 Kafa Dağıtmalık</button>
            <button class="btn-mood btn" onclick="setMood('beyin_yakan')">🤯 Beyin Yakanlar</button>
            <button class="btn-mood btn" onclick="setMood('kaliteli_dram')">🎭 Kaliteli Dram</button>
            <button class="btn-mood btn" onclick="setMood('korku_gecesi')">👻 Korku Gecesi</button>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label style="font-size: 12px; color: #888;">Tür</label>
                <select id="genre">
                    <option value="28">Aksiyon</option><option value="878">Bilim Kurgu</option><option value="18">Dram</option>
                    <option value="53">Gerilim</option><option value="35">Komedi</option><option value="27">Korku</option><option value="10749">Romantik</option>
                </select>
            </div>
            <div class="input-group">
                <label style="font-size: 12px; color: #888;">Yıl</label>
                <input type="number" id="year" value="2024">
            </div>
        </div>

        <div style="margin-top: 20px;">
            <label style="display:flex; justify-content:space-between; font-size:12px; color:#888;">Minimum Puan: <span id="ratingValue" style="color:var(--primary-color)">7.0</span></label>
            <input type="range" id="rating" min="0" max="10" step="0.5" value="7.0" style="width:100%; accent-color:var(--primary-color)" oninput="document.getElementById('ratingValue').innerText = this.value">
        </div>

        <button class="btn btn-primary bg-blue" style="width:100%; justify-content:center; margin-top:25px;" onclick="getMovies()">FİLM BUL</button>
    </div>

    <div id="results"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgZUjN5VzN-z16ENQK-lDvLOZ8TXWAe4o",
            authDomain: "ne-izlesem-app-58868.firebaseapp.com",
            projectId: "ne-izlesem-app-58868",
            storageBucket: "ne-izlesem-app-58868.firebasestorage.app",
            messagingSenderId: "845923520501",
            appId: "1:845923520501:web:fc8af7892227034c4f5abc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const API_KEY = 'd0101ce0dec20d3b12853cabffd10e74';
        let currentUser = null;
        let currentDisplayedMovies = [];

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authBtn = document.getElementById('auth-btn');
            const welcome = document.getElementById('user-welcome');
            if (user) {
                welcome.innerText = `Selam, ${user.displayName.split(' ')[0]}`;
                authBtn.innerHTML = `<i class="fa-solid fa-right-from-bracket"></i> Çıkış`;
                authBtn.onclick = () => signOut(auth);
            } else {
                welcome.innerText = "";
                authBtn.innerHTML = `Giriş Yap`;
                authBtn.onclick = login;
            }
        });

        window.login = async () => { try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); } };

        // FİREBASE: İzleme Listesi ve Puanlama
        window.addToWatchlist = async (movieId) => {
            if (!currentUser) return alert("Önce giriş yapmalıs stubborn!");
            const movie = currentDisplayedMovies.find(m => m.id === movieId);
            try {
                const colRef = collection(db, "users", currentUser.uid, "watchlist");
                const q = query(colRef, where("id", "==", movieId));
                const snap = await getDocs(q);
                if (!snap.empty) return alert("Zaten listede!");

                await addDoc(colRef, { ...movie, watched: false, myScore: 0, addedAt: new Date() });
                alert("Listeye eklendi! 🍿");
            } catch (e) { console.error(e); }
        };

        window.toggleWatched = async (movieId, status) => {
            const userRef = collection(db, "users", currentUser.uid, "watchlist");
            const q = query(userRef, where("id", "==", movieId));
            const snap = await getDocs(q);
            snap.forEach(async (d) => {
                await updateDoc(doc(db, "users", currentUser.uid, "watchlist", d.id), { watched: !status });
            });
            window.showWatchlist();
        };

        window.updateMyScore = async (movieId, score) => {
            const userRef = collection(db, "users", currentUser.uid, "watchlist");
            const q = query(userRef, where("id", "==", movieId));
            const snap = await getDocs(q);
            snap.forEach(async (d) => {
                await updateDoc(doc(db, "users", currentUser.uid, "watchlist", d.id), { myScore: Number(score) });
            });
        };

        window.removeFromWatchlist = async (movieId) => {
            const userRef = collection(db, "users", currentUser.uid, "watchlist");
            const q = query(userRef, where("id", "==", movieId));
            const snap = await getDocs(q);
            snap.forEach(async (d) => await deleteDoc(doc(db, "users", currentUser.uid, "watchlist", d.id)));
            window.showWatchlist();
        };

        window.showWatchlist = async () => {
            if (!currentUser) return alert("Giriş yapmalısın!");
            document.getElementById('searchSection').style.display = 'none';
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "<h2 class='section-title'>Kütüphanem Yükleniyor...</h2>";

            const snap = await getDocs(collection(db, "users", currentUser.uid, "watchlist"));
            const list = [];
            snap.forEach(d => list.push(d.data()));
            renderMoviesToDOM(list, "Kütüphanem 📚", true);
        };

        // TMDB & RENDER
        window.getMovies = async () => {
            const g = document.getElementById('genre').value;
            const y = document.getElementById('year').value;
            const r = document.getElementById('rating').value;
            const url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${g}&primary_release_year=${y}&vote_average.gte=${r}&vote_count.gte=100&language=tr-TR&sort_by=popularity.desc`;
            const res = await fetch(url);
            const data = await res.json();
            renderMoviesToDOM(data.results.slice(0, 12), "Senin İçin Seçtiklerimiz 🍿");
        };

        window.searchByName = async () => {
            const q = document.getElementById('searchInput').value;
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}&language=tr-TR`);
            const data = await res.json();
            renderMoviesToDOM(data.results.slice(0, 12), `"${q}" Sonuçları`);
        };

        window.getRandomMovie = async () => {
            const p = Math.floor(Math.random() * 20) + 1;
            const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&vote_average.gte=7.5&language=tr-TR&page=${p}`);
            const data = await res.json();
            const movie = data.results[Math.floor(Math.random() * data.results.length)];
            renderMoviesToDOM([movie], "Gecenin Şanslısı 🎲");
        };

        window.renderMoviesToDOM = async (movies, title, isLibrary = false) => {
            currentDisplayedMovies = movies;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<h2 class="section-title">${title}</h2>`;
            
            if(movies.length > 0 && movies[0].backdrop_path) {
                document.getElementById('dynamic-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movies[0].backdrop_path})`;
            }

            movies.forEach(m => {
                const poster = m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : 'https://via.placeholder.com/500x750?text=Afiş+Yok';
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="movie-poster-container">
                        <img src="${poster}" class="movie-poster">
                        <div class="rating-badge">⭐ ${m.vote_average.toFixed(1)}</div>
                        ${isLibrary && m.watched ? '<div class="status-badge status-watched">İzlendi</div>' : ''}
                    </div>
                    <div class="movie-content">
                        <h3 class="movie-title">${m.title}</h3>
                        <p class="movie-overview">${m.overview || 'Özet bulunmuyor.'}</p>
                        
                        ${isLibrary ? `
                            <div class="user-rating-box">
                                <span>Puanım:</span>
                                <input type="number" min="0" max="10" value="${m.myScore || 0}" onchange="updateMyScore(${m.id}, this.value)">
                            </div>
                        ` : ''}

                        <div class="action-buttons">
                            <button class="btn-sm bg-blue" onclick="getSimilarMovies(${m.id}, '${m.title.replace(/'/g, "\\'")}')">Benzerler</button>
                            ${isLibrary ? `
                                <button class="btn-sm bg-green" onclick="toggleWatched(${m.id}, ${m.watched})">${m.watched ? 'İzlemedim' : 'İzledim'}</button>
                                <button class="btn-sm bg-red btn-full" onclick="removeFromWatchlist(${m.id})">Kaldır</button>
                            ` : `
                                <button class="btn-sm bg-green" onclick="addToWatchlist(${m.id})">Listeye Ekle</button>
                            `}
                        </div>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });
        };

        window.setMood = (mood) => {
            const g = document.getElementById('genre');
            if(mood==='kafa_dagitmalik') g.value="35";
            if(mood==='beyin_yakan') g.value="878";
            if(mood==='kaliteli_dram') g.value="18";
            if(mood==='korku_gecesi') g.value="27";
            getMovies();
        };

        window.getSimilarMovies = async (id, name) => {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${API_KEY}&language=tr-TR`);
            const data = await res.json();
            renderMoviesToDOM(data.results.slice(0, 6), `"${name}" Benzeri Filmler ✨`);
        };
    </script>
</body>
</html>
