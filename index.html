<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Ne İzlesem? | Premium Film Kütüphanem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #01b4e4;
            --secondary-color: #90cea1;
            --accent-color: #e50914;
            --site-rating-color: #ffd700;
            --bg-dark: #0d1117;
            --card-bg: rgba(255, 255, 255, 0.08);
            --modal-bg: rgba(20, 24, 28, 0.98);
        }

        #dynamic-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark);
            background-size: cover; background-position: center;
            filter: blur(25px) brightness(0.2); z-index: -1;
            transition: background-image 1.2s ease;
        }

        body {
            font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding: 20px;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg-dark);
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        .header-bar {
            width: 100%; max-width: 1100px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 30px; padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo { font-size: 26px; font-weight: 600; color: var(--primary-color); cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        
        .user-nav { display: flex; gap: 12px; align-items: center; }
        
        .btn {
            border: none; padding: 10px 18px; border-radius: 12px; font-weight: 600;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-dice { background: #f39c12; color: white; }
        .btn-list { background: var(--card-bg); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-auth { background: white; color: #333; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        /* Arama Alanı ve Gelişmiş Giriş Kutuları */
        .search-container {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; width: 100%; max-width: 650px;
            margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .direct-search-box { display: flex; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 8px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.15); transition: 0.3s; }
        .direct-search-box:focus-within { border-color: var(--primary-color); background: rgba(255,255,255,0.1); }
        .direct-search-box input { background: transparent; border: none; color: white; padding: 12px; flex: 1; outline: none; font-size: 16px; }
        .btn-search { background: var(--primary-color); border-radius: 15px; color: white; padding: 0 25px; border: none; cursor: pointer; font-size: 18px; }

        /* Modernize Edilmiş Seçim Kutuları */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .input-group select, .input-group input[type="number"] { 
            background: rgba(255,255,255,0.08); 
            border: 2px solid rgba(255,255,255,0.1); 
            color: white; 
            padding: 16px; 
            border-radius: 18px; 
            width: 100%; 
            outline: none; 
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .input-group select:focus, .input-group input:focus {
            border-color: var(--primary-color);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 15px rgba(1, 180, 228, 0.3);
        }

        .mood-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }

        /* Kart Tasarımı */
        #results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .movie-card {
            background: var(--card-bg); border-radius: 22px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; position: relative;
            cursor: pointer; display: flex; flex-direction: column;
        }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary-color); box-shadow: 0 15px 30px rgba(1, 180, 228, 0.3); }

        .movie-poster-container { position: relative; height: 400px; overflow: hidden; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; transition: 0.7s; }
        .movie-card:hover .movie-poster { transform: scale(1.1); }

        .rating-badges { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 5px; z-index: 2; }
        .badge { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .imdb-badge { color: #ffbc00; }
        .site-badge { color: var(--site-rating-color); border-color: var(--site-rating-color); }

        .movie-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .movie-title { margin: 0 0 10px 0; font-size: 19px; font-weight: 600; }
        .movie-overview { font-size: 13px; color: #bbb; line-height: 1.5; height: 60px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; margin-bottom: 15px; }

        /* MODAL VE YORUM SİSTEMİ */
        #movieModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(12px);
            padding: 20px; box-sizing: border-box;
        }
        .modal-container { background: var(--modal-bg); width: 100%; max-width: 1000px; max-height: 90vh; border-radius: 28px; position: relative; overflow-y: auto; border: 1px solid rgba(255,255,255,0.15); animation: modalFade 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalFade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; z-index: 10; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; transition: 0.3s; }
        .modal-close:hover { background: var(--accent-color); transform: rotate(90deg); }
        .modal-body { display: flex; flex-direction: row; gap: 40px; padding: 45px; }
        @media (max-width: 850px) { .modal-body { flex-direction: column; padding: 25px; } .modal-poster { width: 100% !important; height: auto !important; max-width: 350px; align-self: center; } }
        .modal-poster { width: 320px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .modal-details { flex: 1; }

        /* Yorum Alanı */
        .review-section { margin-top: 30px; background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .review-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .review-form textarea { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; font-family: inherit; resize: none; min-height: 80px; outline: none; transition: 0.3s; }
        .review-form textarea:focus { border-color: var(--primary-color); }
        .review-inputs-row { display: flex; justify-content: space-between; align-items: center; }
        .rating-input { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .rating-input input { width: 60px; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: #000; color: #fff; text-align: center; }
        
        .comments-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; max-height: 300px; overflow-y: auto; padding-right: 10px; }
        .comment-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; font-size: 13px; position: relative; border-left: 3px solid var(--primary-color); }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: 600; color: var(--primary-color); }
        .comment-text { color: #ccc; line-height: 1.4; }
        .comment-score { color: var(--site-rating-color); font-size: 12px; }

        .section-title { grid-column: 1 / -1; text-align: center; color: var(--primary-color); margin: 25px 0; font-size: 24px; font-weight: 600; }
        .btn-sm { padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; color: white; transition: 0.2s; }
        .bg-blue { background: var(--primary-color); }
        .bg-green { background: #27ae60; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <div id="movieModal">
        <div class="modal-container">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <div class="header-bar">
        <a href="#" class="logo" onclick="location.reload()">🎬 Ne İzlesem?</a>
        <div class="user-nav">
            <span id="user-welcome" class="welcome-msg"></span>
            <button class="btn btn-dice" onclick="getRandomMovie()"><i class="fa-solid fa-dice"></i> Rastgele</button>
            <button class="btn btn-list" onclick="showWatchlist()"><i class="fa-solid fa-bookmark"></i> Listem</button>
            <button id="auth-btn" class="btn btn-auth" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <div class="search-container" id="searchSection">
        <div class="direct-search-box">
            <input type="text" id="searchInput" placeholder="Hangi filmi arıyorsun?">
            <button class="btn-search" onclick="searchByName()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        
        <div class="mood-container">
            <button class="btn btn-mood" onclick="setMood('kafa_dagitmalik')">🤪 Kafa Dağıtmalık</button>
            <button class="btn btn-mood" onclick="setMood('beyin_yakan')">🤯 Beyin Yakanlar</button>
            <button class="btn btn-mood" onclick="setMood('kaliteli_dram')">🎭 Kaliteli Dram</button>
            <button class="btn btn-mood" onclick="setMood('korku_gecesi')">👻 Korku Gecesi</button>
        </div>

        <div class="input-row">
            <div class="input-group">
                <select id="genre">
                    <option value="28">Aksiyon</option><option value="878">Bilim Kurgu</option><option value="18">Dram</option>
                    <option value="53">Gerilim</option><option value="35">Komedi</option><option value="27">Korku</option><option value="10749">Romantik</option>
                </select>
            </div>
            <div class="input-group">
                <input type="number" id="year" value="2024">
            </div>
        </div>

        <div style="margin-top: 20px;">
            <label style="display:flex; justify-content:space-between; font-size:12px; color:#aaa; margin-bottom:8px;">Min. IMDb Puanı: <span id="ratingValue" style="color:var(--primary-color); font-weight:bold;">7.0</span></label>
            <input type="range" id="rating" min="0" max="10" step="0.5" value="7.0" style="width:100%; accent-color:var(--primary-color)" oninput="document.getElementById('ratingValue').innerText = this.value">
        </div>

        <button class="btn bg-blue" style="width:100%; justify-content:center; margin-top:25px; padding:15px; border-radius:18px;" onclick="getMovies()">FİLMLERİ KEŞFET</button>
    </div>

    <div id="results"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgZUjN5VzN-z16ENQK-lDvLOZ8TXWAe4o",
            authDomain: "ne-izlesem-app-58868.firebaseapp.com",
            projectId: "ne-izlesem-app-58868",
            storageBucket: "ne-izlesem-app-58868.firebasestorage.app",
            messagingSenderId: "845923520501",
            appId: "1:845923520501:web:fc8af7892227034c4f5abc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'film-oneri-sistemi';

        const API_KEY = 'd0101ce0dec20d3b12853cabffd10e74';
        let currentUser = null;
        let currentDisplayedMovies = [];

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authBtn = document.getElementById('auth-btn');
            const welcome = document.getElementById('user-welcome');
            if (user) {
                welcome.innerText = `Hoş geldin, ${user.displayName.split(' ')[0]}`;
                authBtn.innerHTML = `<i class="fa-solid fa-power-off"></i>`;
                authBtn.onclick = () => signOut(auth);
            } else {
                welcome.innerText = "";
                authBtn.innerHTML = `Giriş Yap`;
                authBtn.onclick = login;
            }
        });

        window.login = async () => { try { await signInWithPopup(auth, provider); } catch (e) { console.error(e); } };

        // SİTE PUANI HESAPLAMA
        async function getSiteRatingData(movieId) {
            try {
                const reviewsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reviews');
                const q = query(reviewsRef, where("movieId", "==", movieId));
                const snap = await getDocs(q);
                let total = 0;
                let reviews = [];
                snap.forEach(d => {
                    const data = d.data();
                    total += Number(data.rating);
                    reviews.push(data);
                });
                const avg = reviews.length > 0 ? (total / reviews.length).toFixed(1) : "0.0";
                return { avg, count: reviews.length, reviews };
            } catch (e) { return { avg: "0.0", count: 0, reviews: [] }; }
        }

        // YORUM EKLEME
        window.submitReview = async (movieId) => {
            if (!currentUser) return alert("Yorum yapmak için giriş yapmalısın!");
            const ratingInput = document.getElementById('user-rating-val').value;
            const commentInput = document.getElementById('user-comment-val').value;

            if (ratingInput < 1 || ratingInput > 10) return alert("Puan 1 ile 10 arasında olmalı!");
            if (!commentInput.trim()) return alert("Lütfen bir yorum yazın.");

            try {
                const reviewsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reviews');
                await addDoc(reviewsRef, {
                    movieId: movieId,
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    rating: ratingInput,
                    comment: commentInput,
                    createdAt: serverTimestamp()
                });
                alert("Yorumun başarıyla eklendi!");
                window.openModal(movieId); // Modalı yenile
            } catch (e) { console.error(e); }
        };

        // MODAL AÇILIŞI
        window.openModal = async (movieId) => {
            const modal = document.getElementById('movieModal');
            const content = document.getElementById('modalContent');
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
            content.innerHTML = "<div style='padding:100px; text-align:center;'><i class='fa-solid fa-spinner fa-spin fa-3xl' style='color:var(--primary-color)'></i></div>";

            try {
                const [movieRes, creditsRes, siteData] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=tr-TR`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/credits?api_key=${API_KEY}&language=tr-TR`),
                    getSiteRatingData(movieId)
                ]);
                
                const movie = await movieRes.json();
                const credits = await creditsRes.json();
                const poster = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=Afiş+Yok';
                const cast = credits.cast.slice(0, 5);

                let commentsHTML = siteData.reviews.length > 0 
                    ? siteData.reviews.map(r => `
                        <div class="comment-card">
                            <div class="comment-header">
                                <span>${r.userName}</span>
                                <span class="comment-score">⭐ ${r.rating}/10</span>
                            </div>
                            <div class="comment-text">${r.comment}</div>
                        </div>
                    `).join('') 
                    : "<p style='color:#666; font-size:13px;'>Henüz yorum yapılmamış. İlk yorumu sen yap!</p>";

                content.innerHTML = `
                    <div class="modal-body">
                        <img src="${poster}" class="modal-poster">
                        <div class="modal-details">
                            <div class="modal-header">
                                <h2>${movie.title}</h2>
                                <div class="modal-meta">
                                    <span><i class="fa-solid fa-star" style="color:#ffbc00"></i> IMDb: ${movie.vote_average.toFixed(1)}</span>
                                    <span><i class="fa-solid fa-award" style="color:var(--site-rating-color)"></i> Site: ${siteData.avg} (${siteData.count})</span>
                                    <span><i class="fa-solid fa-clock"></i> ${movie.runtime || '?'} dk</span>
                                </div>
                            </div>
                            
                            <div class="modal-section-title">Film Özeti</div>
                            <p class="modal-desc">${movie.overview || 'Özet bulunmuyor.'}</p>
                            
                            <div class="modal-section-title">Başrol Oyuncuları</div>
                            <div class="cast-list">
                                ${cast.map(c => `
                                    <div class="cast-item">
                                        <img src="${c.profile_path ? 'https://image.tmdb.org/t/p/w185'+c.profile_path : 'https://via.placeholder.com/100'}" class="cast-img">
                                        <span class="cast-name">${c.name}</span>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="review-section">
                                <div class="modal-section-title" style="margin-top:0">Fikrini Paylaş</div>
                                <div class="review-form">
                                    <textarea id="user-comment-val" placeholder="Film hakkında ne düşünüyorsun? (Spoiler içermezse harika olur!)"></textarea>
                                    <div class="review-inputs-row">
                                        <div class="rating-input">
                                            Puanın: <input type="number" id="user-rating-val" min="1" max="10" value="8"> / 10
                                        </div>
                                        <button class="btn bg-blue" onclick="submitReview(${movieId})">Gönder</button>
                                    </div>
                                </div>
                                <div class="modal-section-title">Site Yorumları</div>
                                <div class="comments-list">${commentsHTML}</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) { content.innerHTML = "<p>Yüklenemedi.</p>"; }
        };

        window.closeModal = () => {
            document.getElementById('movieModal').style.display = 'none';
            document.body.classList.remove('modal-open');
        };

        window.renderMoviesToDOM = async (movies, title, isLibrary = false) => {
            currentDisplayedMovies = movies;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<h2 class="section-title">${title}</h2>`;
            
            if(movies.length > 0 && movies[0].backdrop_path) {
                document.getElementById('dynamic-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movies[0].backdrop_path})`;
            }

            for (const m of movies) {
                const poster = m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : 'https://via.placeholder.com/500x750?text=Afiş+Yok';
                const siteData = await getSiteRatingData(m.id);
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => window.openModal(m.id);

                card.innerHTML = `
                    <div class="movie-poster-container">
                        <img src="${poster}" class="movie-poster">
                        <div class="rating-badges">
                            <div class="badge imdb-badge">⭐ ${m.vote_average.toFixed(1)}</div>
                            <div class="badge site-badge">💎 ${siteData.avg}</div>
                        </div>
                    </div>
                    <div class="movie-content">
                        <h3 class="movie-title">${m.title}</h3>
                        <p class="movie-overview">${m.overview || 'Özet bulunmuyor.'}</p>
                        <div class="action-buttons">
                            ${isLibrary ? `
                                <button class="btn-sm bg-green" onclick="toggleWatched(${m.id}, ${m.watched}, event)">${m.watched ? 'İzlemedim' : 'İzledim'}</button>
                                <button class="btn-sm bg-red btn-full" onclick="removeFromWatchlist(${m.id}, event)">Kaldır</button>
                            ` : `
                                <button class="btn-sm bg-blue" onclick="getSimilarMovies(${m.id}, '${m.title.replace(/'/g, "\\'")}', event)">Benzerler</button>
                                <button class="btn-sm bg-green" onclick="addToWatchlist(${m.id}, event)">Kaydet</button>
                            `}
                        </div>
                    </div>
                `;
                resultsDiv.appendChild(card);
            }
        };

        // DİĞER FONKSİYONLAR
        window.getMovies = async () => {
            const g = document.getElementById('genre').value;
            const y = document.getElementById('year').value;
            const r = document.getElementById('rating').value;
            document.getElementById('results').innerHTML = "<h2 class='section-title'>Binlerce film taranıyor... 🛸</h2>";
            const baseUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${g}&primary_release_year=${y}&vote_average.gte=${r}&vote_count.gte=50&language=tr-TR`;
            try {
                const initialRes = await fetch(baseUrl);
                const initialData = await initialRes.json();
                const totalPages = Math.min(initialData.total_pages, 500);
                const randomPage = Math.floor(Math.random() * totalPages) + 1;
                const res = await fetch(`${baseUrl}&page=${randomPage}`);
                const data = await res.json();
                const shuffled = data.results.sort(() => Math.random() - 0.5);
                window.renderMoviesToDOM(shuffled.slice(0, 12), "Keşif Listesi 🍿");
            } catch (err) { console.error(err); }
        };

        window.searchByName = async () => {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}&language=tr-TR`);
            const data = await res.json();
            window.renderMoviesToDOM(data.results.slice(0, 12), `"${q}" İçin Sonuçlar`);
        };

        window.getRandomMovie = async () => {
            document.getElementById('results').innerHTML = "<h2 class='section-title'>Zarlar atılıyor... 🎲</h2>";
            const p = Math.floor(Math.random() * 500) + 1;
            const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&vote_average.gte=7.5&vote_count.gte=500&language=tr-TR&page=${p}`);
            const data = await res.json();
            if (data.results && data.results.length > 0) {
                const movie = data.results[Math.floor(Math.random() * data.results.length)];
                window.renderMoviesToDOM([movie], "Gecenin Şanslısı 🎲");
            }
        };

        window.setMood = (mood) => {
            const g = document.getElementById('genre');
            if(mood==='kafa_dagitmalik') g.value="35";
            if(mood==='beyin_yakan') g.value="878";
            if(mood==='kaliteli_dram') g.value="18";
            if(mood==='korku_gecesi') g.value="27";
            window.getMovies();
        };

        window.addToWatchlist = async (movieId, event) => {
            if(event) event.stopPropagation();
            if (!currentUser) return alert("Giriş yapmalısın!");
            const movie = currentDisplayedMovies.find(m => m.id === movieId);
            const colRef = collection(db, "users", currentUser.uid, "watchlist");
            const q = query(colRef, where("id", "==", movieId));
            const snap = await getDocs(q);
            if (!snap.empty) return alert("Zaten ekli!");
            await addDoc(colRef, { ...movie, watched: false, addedAt: new Date() });
            alert("Eklendi!");
        };

        window.removeFromWatchlist = async (movieId, event) => {
            if(event) event.stopPropagation();
            const q = query(collection(db, "users", currentUser.uid, "watchlist"), where("id", "==", movieId));
            const snap = await getDocs(q);
            snap.forEach(async (d) => await deleteDoc(doc(db, "users", currentUser.uid, "watchlist", d.id)));
            window.showWatchlist();
        };

        window.showWatchlist = async () => {
            if (!currentUser) return alert("Giriş yapmalısın!");
            document.getElementById('searchSection').style.display = 'none';
            const resultsDiv = document.getElementById('results');
            const snap = await getDocs(collection(db, "users", currentUser.uid, "watchlist"));
            const list = []; snap.forEach(d => list.push(d.data()));
            window.renderMoviesToDOM(list, "Kütüphanem 📚", true);
        };

        window.getSimilarMovies = async (id, name, event) => {
            if(event) event.stopPropagation();
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/similar?api_key=${API_KEY}&language=tr-TR`);
            const data = await res.json();
            window.renderMoviesToDOM(data.results.slice(0, 6), `"${name}" Benzerleri ✨`);
        };
    </script>
</body>
</html>
