<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Ne İzlesem? | Premium AI Kütüphanem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Excel Çıktısı alabilmek için SheetJS kütüphanesi eklendi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-color: #01b4e4; --secondary-color: #90cea1;
            --accent-color: #e50914; --site-rating-color: #ffd700;
            --bg-dark: #0d1117; --card-bg: rgba(255, 255, 255, 0.08);
            --modal-bg: rgba(20, 24, 28, 0.98);
        }

        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-dark); background-size: cover; background-position: center; filter: blur(25px) brightness(0.2); z-index: -1; transition: background-image 1.2s ease; }

        body { font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-color: var(--bg-dark); overflow-x: hidden; }
        body.modal-open { overflow: hidden; }

        /* Header & Nav */
        .header-bar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap:15px; }
        .logo { font-size: 26px; font-weight: 600; color: var(--primary-color); cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .user-nav { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .btn { border: none; padding: 10px 18px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-dice { background: #f39c12; color: white; }
        .btn-ai { background: linear-gradient(45deg, #8e44ad, #3498db); color: white; box-shadow: 0 0 15px rgba(142, 68, 173, 0.5); }
        .btn-ai:hover { box-shadow: 0 0 25px rgba(142, 68, 173, 0.8); }
        .btn-list { background: var(--card-bg); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-auth { background: white; color: #333; }
        .btn:hover { transform: translateY(-3px); }

        /* Arama & Filtre (Glassmorphism) */
        .search-container { background: var(--card-bg); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; width: 100%; max-width: 800px; margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .direct-search-box { display: flex; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 8px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.15); transition: 0.3s; }
        .direct-search-box:focus-within { border-color: var(--primary-color); background: rgba(255,255,255,0.1); }
        .direct-search-box input { background: transparent; border: none; color: white; padding: 12px; flex: 1; outline: none; font-size: 16px; }

        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .input-group select, .input-group input[type="number"] { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 15px; width: 100%; outline: none; font-size: 14px; font-family: 'Poppins', sans-serif; transition: 0.3s; cursor: pointer; }
        .input-group select option { background-color: var(--bg-dark); color: white; }
        .input-group select:focus, .input-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 15px rgba(1, 180, 228, 0.3); }

        /* Kart ve Skeleton Tasarımı */
        #results { width: 100%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; position: relative; cursor: pointer; display: flex; flex-direction: column; }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary-color); box-shadow: 0 15px 30px rgba(1, 180, 228, 0.3); }
        .movie-poster-container { position: relative; height: 380px; overflow: hidden; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; transition: 0.7s; }
        .movie-card:hover .movie-poster { transform: scale(1.1); }
        
        .rating-badges { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 2; }
        .badge { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 11px; display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .imdb-badge { color: #ffbc00; } .site-badge { color: var(--site-rating-color); border-color: var(--site-rating-color); }
        .type-badge { position: absolute; top: 10px; left: 10px; background: var(--primary-color); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; z-index: 2; text-transform: uppercase; }

        .movie-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .movie-title { margin: 0 0 8px 0; font-size: 17px; font-weight: 600; }
        .movie-overview { font-size: 12px; color: #bbb; line-height: 1.5; height: 55px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; margin-bottom: 15px; }

        /* Skeleton Yükleyici */
        .skeleton { pointer-events: none; border-color: transparent; }
        .skeleton .movie-poster-container { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        .skeleton-text { height: 15px; background: #222; margin-bottom: 10px; border-radius: 5px; width: 80%; }
        .skeleton-text.full { height: 40px; width: 100%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* MODAL VE YORUM SİSTEMİ */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(12px); padding: 20px; box-sizing: border-box; }
        .modal-container { background: var(--modal-bg); width: 100%; max-width: 1000px; max-height: 90vh; border-radius: 28px; position: relative; overflow-y: auto; border: 1px solid rgba(255,255,255,0.15); animation: modalFade 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalFade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #fff; cursor: pointer; z-index: 10; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; transition: 0.3s; }
        .modal-close:hover { background: var(--accent-color); transform: rotate(90deg); }
        .modal-body { display: flex; flex-direction: row; gap: 30px; padding: 40px; }
        @media (max-width: 850px) { .modal-body { flex-direction: column; padding: 20px; } .modal-poster { width: 100% !important; height: auto !important; max-width: 300px; align-self: center; } }
        .modal-poster { width: 300px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .modal-details { flex: 1; }

        /* Fragman Oynatıcı */
        .trailer-container { width: 100%; aspect-ratio: 16/9; margin-top: 20px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .trailer-container:hover { border-color: var(--accent-color); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); }
        .trailer-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.3s; }
        .trailer-container:hover img { opacity: 0.4; transform: scale(1.05); }
        .play-icon { position: absolute; font-size: 60px; color: var(--accent-color); filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); transition: 0.3s; }
        .trailer-container:hover .play-icon { transform: scale(1.1); }

        /* Özel Bildirim (Toast) */
        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--primary-color); color: white; padding: 15px 25px; border-radius: 12px; font-weight: 600; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.4s 3s forwards; }
        .toast.error { background: var(--accent-color); }
        .toast.success { background: #27ae60; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(120%); } }

        /* AI Prompt Modalı */
        #aiPromptModal .modal-container { max-width: 600px; text-align: center; padding: 40px; }
        #aiPromptInput { width: 100%; background: rgba(0,0,0,0.3); border: 2px solid var(--primary-color); border-radius: 15px; padding: 15px; color: white; font-family: inherit; font-size: 16px; margin: 20px 0; outline: none; resize: none; min-height: 100px; }

        .section-title { grid-column: 1 / -1; text-align: center; color: var(--primary-color); margin: 25px 0; font-size: 24px; font-weight: 600; }
        .btn-sm { padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; color: white; transition: 0.2s; }
        .bg-blue { background: var(--primary-color); } .bg-green { background: #27ae60; } .bg-red { background: var(--accent-color); }
        .btn-full { grid-column: 1 / -1; margin-top: 5px; }
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }
        
        /* Loading trigger for infinite scroll */
        #load-more-trigger { grid-column: 1 / -1; height: 20px; }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>

    <!-- Toast Bildirim Alanı -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Film Detay Modalı -->
    <div id="movieModal" class="modal-overlay">
        <div class="modal-container">
            <span class="modal-close" onclick="closeModal('movieModal')">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- AI Arama Modalı -->
    <div id="aiPromptModal" class="modal-overlay">
        <div class="modal-container">
            <span class="modal-close" onclick="closeModal('aiPromptModal')">&times;</span>
            <h2 style="color:var(--primary-color);"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Asistan</h2>
            <p style="color:#bbb; font-size:14px;">Nasıl bir şey izlemek istersin? Kendi cümlelerinle tarif et.</p>
            <textarea id="aiPromptInput" placeholder="Örn: 90'larda geçen, ters köşe yapan gerilim dolu dedektiflik filmleri..."></textarea>
            <button class="btn btn-ai" style="width:100%; justify-content:center; padding:15px; font-size:16px;" onclick="searchWithAI()">Bana Film Bul 🤖</button>
        </div>
    </div>

    <div class="header-bar">
        <a href="#" class="logo" onclick="location.reload()">🎬 Ne İzlesem?</a>
        <div class="user-nav">
            <span id="user-welcome" style="color:var(--primary-color); font-size:13px; margin-right:5px;"></span>
            <button class="btn btn-ai" onclick="openAIModal()">🤖 AI Öneri</button>
            <button class="btn btn-dice" onclick="getRandomMovie()"><i class="fa-solid fa-dice"></i> Rastgele</button>
            <button class="btn btn-list" onclick="showWatchlist()"><i class="fa-solid fa-bookmark"></i> Listem</button>
            <button id="auth-btn" class="btn btn-auth" onclick="login()">Giriş Yap</button>
        </div>
    </div>

    <div class="search-container" id="searchSection">
        <div class="direct-search-box">
            <i class="fa-solid fa-magnifying-glass" style="color:#aaa; align-self:center; margin-left:10px;"></i>
            <!-- Canlı Arama input event'i eklendi -->
            <input type="text" id="searchInput" placeholder="Film, dizi veya oyuncu ara (Yazarken otomatik arar)...">
        </div>

        <!-- 4 Sütunlu Modern Filtre -->
        <div class="input-row">
            <div class="input-group">
                <select id="contentType" onchange="updateGenres()">
                    <option value="movie">🎬 Filmler</option>
                    <option value="tv">📺 Diziler</option>
                </select>
            </div>
            <div class="input-group">
                <select id="genre">
                    <option value="">Tüm Türler</option>
                    <option value="28">Aksiyon</option>
                    <option value="878">Bilim Kurgu</option>
                    <option value="18">Dram</option>
                    <option value="53">Gerilim</option>
                    <option value="35">Komedi</option>
                </select>
            </div>
            <div class="input-group">
                <input type="number" id="year" placeholder="Yıl" value="2024">
            </div>
            <div class="input-group">
                <select id="sortBy">
                    <option value="popularity.desc">🔥 En Popüler</option>
                    <option value="primary_release_date.desc">✨ En Yeniler</option>
                    <option value="vote_average.desc">⭐ Puanı Yüksekler</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 10px;">
            <label style="display:flex; justify-content:space-between; font-size:12px; color:#aaa; margin-bottom:8px;">Min. IMDb Puanı: <span id="ratingValue" style="color:var(--primary-color); font-weight:bold;">7.0</span></label>
            <input type="range" id="rating" min="0" max="10" step="0.5" value="7.0" style="width:100%; accent-color:var(--primary-color)" oninput="document.getElementById('ratingValue').innerText = this.value">
        </div>

        <button class="btn bg-blue" style="width:100%; justify-content:center; margin-top:25px; padding:15px; border-radius:18px;" onclick="getMovies(true)">FİLM / DİZİ KEŞFET</button>
    </div>

    <div id="results"></div>

    <script type="module">
        // PWA manifest verisi
        const manifest = {
            "name": "Ne İzlesem?", "short_name": "Neİzlesem", "start_url": ".", "display": "standalone",
            "background_color": "#0d1117", "theme_color": "#01b4e4",
            "icons": [{"src": "https://via.placeholder.com/192x192/01b4e4/ffffff.png?text=NI", "sizes": "192x192", "type": "image/png"}]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(manifestBlob)}">`);

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgZUjN5VzN-z16ENQK-lDvLOZ8TXWAe4o",
            authDomain: "ne-izlesem-app-58868.firebaseapp.com",
            projectId: "ne-izlesem-app-58868",
            storageBucket: "ne-izlesem-app-58868.firebasestorage.app",
            messagingSenderId: "845923520501",
            appId: "1:845923520501:web:fc8af7892227034c4f5abc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'film-oneri-sistemi';

        const API_KEY = 'd0101ce0dec20d3b12853cabffd10e74';
        
        // Canvas ortamının çalışabilmesi için anahtar boş bırakıldı. Kendi sunucuna geçerken buraya kendi API anahtarını girebilirsin.
        const GEMINI_API_KEY = ""; 
        
        let currentUser = null;
        let currentDisplayedMovies = [];
        
        // Infinite Scroll State
        let currentApiUrl = "";
        let currentPage = 1;
        let isFetching = false;

        // Profesyonel Toast (Bildirim) Sistemi
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>';
            toast.innerHTML = `${icon} ${message}`;
            container.appendChild(toast);
            setTimeout(() => { if(toast.parentNode) toast.parentNode.removeChild(toast); }, 3400);
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authBtn = document.getElementById('auth-btn');
            const welcome = document.getElementById('user-welcome');
            if (user) {
                welcome.innerText = `Hoş geldin, ${user.displayName.split(' ')[0]}`;
                authBtn.innerHTML = `<i class="fa-solid fa-power-off"></i>`;
                authBtn.onclick = () => { signOut(auth); showToast("Çıkış yapıldı", "success"); };
            } else {
                welcome.innerText = "";
                authBtn.innerHTML = `Giriş Yap`;
                authBtn.onclick = login;
            }
        });

        window.login = async () => { try { await signInWithPopup(auth, provider); showToast("Başarıyla giriş yapıldı!"); } catch (e) { showToast("Giriş iptal edildi", "error"); } };

        // İskelet Yükleyici
        function renderSkeletons() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<h2 class="section-title">Yükleniyor...</h2>` + Array(8).fill(`
                <div class="movie-card skeleton">
                    <div class="movie-poster-container"></div>
                    <div class="movie-content">
                        <div class="skeleton-text"></div>
                        <div class="skeleton-text full"></div>
                    </div>
                </div>
            `).join('');
        }

        // Sonsuz Kaydırma (Infinite Scroll) Gözlemcisi
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentApiUrl && !isFetching) {
                loadMoreMovies();
            }
        }, { rootMargin: '100px' });

        async function loadMoreMovies() {
            isFetching = true;
            currentPage++;
            try {
                const res = await fetch(`${currentApiUrl}&page=${currentPage}`);
                const data = await res.json();
                if(data.results && data.results.length > 0) {
                    const mapped = data.results.map(i => ({...i, media_type: document.getElementById('contentType').value || 'movie'}));
                    appendMoviesToDOM(mapped);
                } else {
                    currentApiUrl = ""; // Daha sayfa kalmadı
                }
            } catch (e) { console.error(e); }
            isFetching = false;
        }

        // CANLI ARAMA (Debounce)
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const q = e.target.value.trim();
            if(q.length === 0) return;
            searchTimeout = setTimeout(() => { searchByName(q); }, 600);
        });

        // API Fonksiyonları
        window.getMovies = async (isNewSearch = true) => {
            if(isNewSearch) renderSkeletons();
            const mediaType = document.getElementById('contentType').value;
            const g = document.getElementById('genre').value;
            const y = document.getElementById('year').value;
            const r = document.getElementById('rating').value;
            const sortBy = document.getElementById('sortBy').value;
            
            const genreQuery = g ? `&with_genres=${g}` : '';
            const yearQuery = mediaType === 'movie' ? `&primary_release_year=${y}` : `&first_air_date_year=${y}`;
            
            // Sıralama parametresi dinamik olarak ekleniyor
            currentApiUrl = `https://api.themoviedb.org/3/discover/${mediaType}?api_key=${API_KEY}${genreQuery}${yearQuery}&vote_average.gte=${r}&vote_count.gte=20&sort_by=${sortBy}&language=tr-TR`;
            currentPage = 1;
            isFetching = true;

            try {
                const res = await fetch(`${currentApiUrl}&page=1`);
                const data = await res.json();
                isFetching = false;
                
                if(!data.results || data.results.length === 0) {
                    document.getElementById('results').innerHTML = "<h2 class='section-title'>Sonuç bulunamadı. ❌</h2>";
                    return;
                }
                const mappedData = data.results.map(item => ({...item, media_type: mediaType}));
                renderMoviesToDOM(mappedData, "Keşif Listesi 🍿");
            } catch (err) { showToast("Bağlantı hatası", "error"); isFetching = false; }
        };

        window.searchByName = async (queryParam) => {
            const q = queryParam || document.getElementById('searchInput').value;
            if(!q) return;
            renderSkeletons();
            currentApiUrl = ""; // Canlı aramada sonsuz kaydırmayı kapat
            
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}&language=tr-TR`);
            const data = await res.json();
            const filtered = data.results.filter(item => item.media_type === 'movie' || item.media_type === 'tv');
            
            if(filtered.length === 0) document.getElementById('results').innerHTML = "<h2 class='section-title'>Kayıt bulunamadı.</h2>";
            else renderMoviesToDOM(filtered.slice(0, 16), `"${q}" Sonuçları`);
        };

        // YAPAY ZEKA İLE ARAMA FONKSİYONU
        window.openAIModal = () => {
            document.getElementById('aiPromptModal').style.display = 'flex';
            document.body.classList.add('modal-open');
        };

        window.searchWithAI = async () => {
            const prompt = document.getElementById('aiPromptInput').value;
            if(!prompt.trim()) return showToast("Lütfen ne izlemek istediğini yaz!", "error");
            
            closeModal('aiPromptModal');
            renderSkeletons();
            document.querySelector('#results h2').innerHTML = `<i class="fa-solid fa-robot fa-bounce"></i> AI senin için film/dizi seçiyor...`;
            currentApiUrl = ""; // Infinite scroll disabled

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`;
            const payload = {
                contents: [{ parts: [{ text: `Kullanıcı isteği: "${prompt}". Lütfen bu isteğe tam uyan 4 adet TMDB'de bulunan gerçek film veya dizinin sadece orijinal adlarını aralarına virgül koyarak yaz. Başka hiçbir kelime, sembol veya açıklama ekleme. (Örnek çıktı: Inception, The Matrix, Seven, Fight Club)` }] }]
            };

            try {
                const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error("API isteği başarısız oldu");
                const result = await response.json();
                const aiResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if(!aiResponse) throw new Error("AI yanıt vermedi");
                
                const titles = aiResponse.split(',').map(t => t.trim());
                let finalMovies = [];

                // TMDB'de bu isimleri tek tek arat
                for(const t of titles) {
                    const searchRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(t)}&language=tr-TR`);
                    const searchData = await searchRes.json();
                    const item = searchData.results.find(i => i.media_type === 'movie' || i.media_type === 'tv');
                    if(item) finalMovies.push(item);
                }

                if(finalMovies.length > 0) {
                    renderMoviesToDOM(finalMovies, "🤖 Yapay Zeka Özel Önerileri");
                } else {
                    document.getElementById('results').innerHTML = "<h2 class='section-title'>AI sonuç bulamadı. Farklı bir tarif dene.</h2>";
                }

            } catch (err) {
                console.error(err);
                showToast("AI bağlantı hatası: " + err.message, "error");
                document.getElementById('results').innerHTML = "";
            }
        };

        // DOM Render (Yeniden Yazma)
        window.renderMoviesToDOM = async (movies, title, isLibrary = false) => {
            currentDisplayedMovies = movies;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<h2 class="section-title">${title}</h2>`;
            
            if(movies.length > 0 && movies[0].backdrop_path) {
                document.getElementById('dynamic-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${movies[0].backdrop_path})`;
            }

            appendMoviesToDOM(movies, isLibrary);
            
            // Sonsuz kaydırma için tetikleyici ekle
            const trigger = document.createElement('div');
            trigger.id = 'load-more-trigger';
            resultsDiv.appendChild(trigger);
            observer.observe(trigger);
        };

        // DOM Render (Ekleme - Infinite Scroll İçin)
        async function appendMoviesToDOM(movies, isLibrary = false) {
            const resultsDiv = document.getElementById('results');
            const trigger = document.getElementById('load-more-trigger');
            if(trigger) resultsDiv.removeChild(trigger); // Sona eklemek için geçici kaldır

            for (const m of movies) {
                // Sadece var olmayanları ekle (Local Array güncelle)
                if(!currentDisplayedMovies.find(cm => cm.id === m.id)) currentDisplayedMovies.push(m);

                const poster = m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : 'https://via.placeholder.com/500x750?text=Afiş+Yok';
                const siteData = await getSiteRatingData(m.id);
                const itemTitle = m.title || m.name;
                const mediaType = m.media_type || 'movie';
                const typeLabel = mediaType === 'tv' ? 'DİZİ' : 'FİLM';
                const shortOverview = m.overview || '<span style="color:#888; font-style:italic;"><i class="fa-solid fa-robot"></i> Türkçe özet yok. Karta tıklayın.</span>';
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => window.openModal(m.id, mediaType);

                card.innerHTML = `
                    <div class="movie-poster-container">
                        <img src="${poster}" class="movie-poster">
                        <div class="type-badge">${typeLabel}</div>
                        <div class="rating-badges">
                            <div class="badge imdb-badge">⭐ ${(m.vote_average || 0).toFixed(1)}</div>
                            <div class="badge site-badge">💎 ${siteData.avg}</div>
                        </div>
                    </div>
                    <div class="movie-content">
                        <h3 class="movie-title">${itemTitle}</h3>
                        <p class="movie-overview">${shortOverview}</p>
                        <div class="action-buttons">
                            ${isLibrary ? `
                                <button class="btn-sm bg-green" onclick="event.stopPropagation(); toggleWatched(${m.id}, ${m.watched})">${m.watched ? 'İzlemedim' : 'İzledim'}</button>
                                <button class="btn-sm bg-red btn-full" onclick="event.stopPropagation(); removeFromWatchlist(${m.id})">Kaldır</button>
                            ` : `
                                <button class="btn-sm bg-blue" onclick="event.stopPropagation(); getSimilarMovies(${m.id}, '${itemTitle.replace(/'/g, "\\'")}', '${mediaType}')">Benzerler</button>
                                <button class="btn-sm bg-green" onclick="event.stopPropagation(); addToWatchlist(${m.id}, '${mediaType}')">Kaydet</button>
                            `}
                        </div>
                    </div>
                `;
                resultsDiv.appendChild(card);
            }

            if(currentApiUrl) {
                const newTrigger = document.createElement('div');
                newTrigger.id = 'load-more-trigger';
                resultsDiv.appendChild(newTrigger);
                observer.observe(newTrigger);
            }
        }

        // Modalda Gömülü Fragman ve AI Çeviri
        window.openModal = async (movieId, mediaType = 'movie') => {
            const modal = document.getElementById('movieModal');
            const content = document.getElementById('modalContent');
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
            content.innerHTML = "<div style='padding:100px; text-align:center;'><i class='fa-solid fa-spinner fa-spin fa-3xl' style='color:var(--primary-color)'></i></div>";

            try {
                // watch/providers API'si eklendi
                const [movieRes, creditsRes, videoRes, providersRes, siteData] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/${mediaType}/${movieId}?api_key=${API_KEY}&language=tr-TR`),
                    fetch(`https://api.themoviedb.org/3/${mediaType}/${movieId}/credits?api_key=${API_KEY}&language=tr-TR`),
                    fetch(`https://api.themoviedb.org/3/${mediaType}/${movieId}/videos?api_key=${API_KEY}&language=en-US`),
                    fetch(`https://api.themoviedb.org/3/${mediaType}/${movieId}/watch/providers?api_key=${API_KEY}`),
                    getSiteRatingData(movieId)
                ]);
                
                const movie = await movieRes.json();
                const credits = await creditsRes.json();
                const videos = await videoRes.json();
                const providersData = await providersRes.json();
                
                const poster = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=Afiş+Yok';
                const cast = credits.cast ? credits.cast.slice(0, 5) : [];
                const title = movie.title || movie.name;
                const releaseYear = (movie.release_date || movie.first_air_date || '?-').split('-')[0];
                const runtime = movie.runtime ? `${movie.runtime} dk` : (movie.episode_run_time && movie.episode_run_time.length > 0 ? `${movie.episode_run_time[0]} dk/bölüm` : '?');

                // Diziye Özel Sezon ve Durum Bilgisi
                let extraMetaHTML = '';
                if (mediaType === 'tv') {
                    const seasons = movie.number_of_seasons ? `${movie.number_of_seasons} Sezon` : '';
                    const episodes = movie.number_of_episodes ? `${movie.number_of_episodes} Bölüm` : '';
                    const status = movie.status === 'Ended' ? 'Final Yaptı' : (movie.status === 'Returning Series' ? 'Devam Ediyor' : 'Durumu Belirsiz');
                    extraMetaHTML = `<span><i class="fa-solid fa-layer-group"></i> ${seasons} (${episodes})</span><span><i class="fa-solid fa-circle-info"></i> ${status}</span>`;
                }

                // Nerede İzlerim? / Yayıncı Platformlar
                const trProviders = providersData.results?.TR?.flatrate || [];
                const providersHTML = trProviders.length > 0 
                    ? `<div style="margin:15px 0; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);">
                         <span style="font-size:12px; color:#aaa; display:block; margin-bottom:8px;">Nerede İzlerim? (Türkiye):</span>
                         <div style="display:flex; gap:10px;">` + trProviders.map(p => `<img src="https://image.tmdb.org/t/p/original${p.logo_path}" title="${p.provider_name}" style="width:35px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.5);">`).join('') + `</div>
                       </div>`
                    : '';

                // Fragman bul ve güvenli bağlantı oluştur
                const trailer = videos.results?.find(v => v.site === 'YouTube' && v.type === 'Trailer');
                let trailerHTML = '';
                if (trailer) {
                    const thumbnailUrl = `https://img.youtube.com/vi/${trailer.key}/hqdefault.jpg`;
                    const youtubeLink = `https://www.youtube.com/watch?v=${trailer.key}`;
                    
                    trailerHTML = `
                        <div class="modal-section-title">Fragman</div>
                        <a href="${youtubeLink}" target="_blank" style="text-decoration:none;">
                            <div class="trailer-container">
                                <img src="${thumbnailUrl}" alt="Fragman">
                                <i class="fa-brands fa-youtube play-icon"></i>
                            </div>
                        </a>
                        <div style="text-align:center; font-size:11px; color:#888; margin-top:5px;">(YouTube'da izlemek için tıklayın)</div>
                    `;
                }

                let finalOverview = movie.overview;
                if (!finalOverview) {
                    try {
                        const enRes = await fetch(`https://api.themoviedb.org/3/${mediaType}/${movieId}?api_key=${API_KEY}&language=en-US`);
                        const enData = await enRes.json();
                        if (enData.overview) {
                            finalOverview = `<div id="ai-translation-box" style="padding:15px; background:rgba(1, 180, 228, 0.1); border-left:4px solid var(--primary-color); border-radius:8px; margin-bottom: 10px;"><i class="fa-solid fa-robot fa-bounce" style="color:var(--primary-color);"></i> AI Türkçe çeviri yapıyor...</div><div style="font-size:12px; color:#888;"><b>EN:</b> ${enData.overview}</div>`;
                            translateToTurkishWithAI(enData.overview).then(text => {
                                const box = document.getElementById('ai-translation-box');
                                if(box) box.innerHTML = `<span style="color:var(--primary-color); font-size:12px; display:block; margin-bottom:5px;"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Çevirisi:</span><span style="color:#eee; font-size:14px;">${text}</span>`;
                            });
                        }
                    } catch (e) {}
                }

                content.innerHTML = `
                    <div class="modal-body">
                        <img src="${poster}" class="modal-poster">
                        <div class="modal-details">
                            <div class="modal-header">
                                <h2 style="margin:0; color:var(--primary-color);">${title} (${releaseYear})</h2>
                                <div style="display:flex; flex-wrap:wrap; gap:15px; color:#888; font-size:14px; margin:10px 0 20px 0;">
                                    <span><i class="fa-solid fa-star" style="color:#ffbc00"></i> ${movie.vote_average.toFixed(1)}</span>
                                    <span><i class="fa-solid fa-award" style="color:var(--site-rating-color)"></i> Site: ${siteData.avg}</span>
                                    <span><i class="fa-solid fa-clock"></i> ${runtime}</span>
                                    ${extraMetaHTML}
                                </div>
                            </div>

                            ${providersHTML}
                            
                            <div class="modal-section-title">Özet</div>
                            <p style="color:#ccc; font-size:15px; line-height:1.6;">${finalOverview || 'Bu içerik için özet bulunmuyor.'}</p>
                            
                            <div class="modal-section-title">Oyuncular</div>
                            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap:10px;">
                                ${cast.map(c => `<div style="text-align:center;"><img src="${c.profile_path ? 'https://image.tmdb.org/t/p/w185'+c.profile_path : 'https://via.placeholder.com/100'}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;"><span style="font-size:11px; display:block; color:#fff;">${c.name}</span></div>`).join('')}
                            </div>

                            ${trailerHTML}

                            <!-- Yorumlar -->
                            <div class="review-section" style="margin-top:30px;">
                                <div class="modal-section-title" style="margin-top:0">Fikrini Paylaş</div>
                                <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">
                                    <textarea id="user-comment-val" placeholder="Ne düşünüyorsun?" style="background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:10px; color:white; min-height:60px; outline:none;"></textarea>
                                    <div style="display:flex; justify-content:space-between;">
                                        <span>Puan: <input type="number" id="user-rating-val" min="1" max="10" value="8" style="width:50px; background:#000; color:white; border:none; padding:5px; border-radius:5px;"> / 10</span>
                                        <button class="btn bg-blue" onclick="submitReview(${movieId}, '${mediaType}')">Gönder</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) { content.innerHTML = "<p>Yüklenemedi.</p>"; }
        };

        window.closeModal = (modalId) => {
            document.getElementById(modalId).style.display = 'none';
            document.body.classList.remove('modal-open');
            if(modalId === 'movieModal') document.getElementById('modalContent').innerHTML = ""; // İframe'i durdurmak için
        };

        // Diğer Eski Fonksiyonların Güncellenmiş Halleri
        window.updateGenres = () => {
            const type = document.getElementById('contentType').value;
            const genreSelect = document.getElementById('genre');
            genreSelect.innerHTML = type === 'movie' 
                ? `<option value="">Tüm Türler</option><option value="28">Aksiyon</option><option value="878">Bilim Kurgu</option><option value="18">Dram</option><option value="53">Gerilim</option><option value="35">Komedi</option>`
                : `<option value="">Tüm Türler</option><option value="10759">Aksiyon & Macera</option><option value="10765">Bilim Kurgu</option><option value="18">Dram</option><option value="9648">Gizem / Gerilim</option><option value="35">Komedi</option>`;
        };

        window.getRandomMovie = async () => {
            renderSkeletons();
            const type = Math.random() > 0.5 ? 'movie' : 'tv';
            try {
                const initRes = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&vote_average.gte=7.5&vote_count.gte=100&language=tr-TR`);
                const initData = await initRes.json();
                if (initData.total_pages > 0) {
                    const randomPage = Math.floor(Math.random() * Math.min(initData.total_pages, 500)) + 1;
                    const res = await fetch(`https://api.themoviedb.org/3/discover/${type}?api_key=${API_KEY}&vote_average.gte=7.5&vote_count.gte=100&language=tr-TR&page=${randomPage}`);
                    const data = await res.json();
                    const item = data.results[Math.floor(Math.random() * data.results.length)];
                    item.media_type = type;
                    renderMoviesToDOM([item], "Gecenin Şanslısı 🎲");
                }
            } catch (err) { showToast("Zar atılamadı", "error"); }
        };

        window.setMood = (mood) => {
            const type = document.getElementById('contentType').value;
            const g = document.getElementById('genre');
            if (type === 'movie') {
                if(mood==='kafa_dagitmalik') g.value="35"; if(mood==='beyin_yakan') g.value="878";
                if(mood==='kaliteli_dram') g.value="18"; if(mood==='korku_gecesi') g.value="27";
            } else {
                if(mood==='kafa_dagitmalik') g.value="35"; if(mood==='beyin_yakan') g.value="10765";
                if(mood==='kaliteli_dram') g.value="18"; if(mood==='korku_gecesi') g.value="9648";
            }
            window.getMovies();
        };

        window.addToWatchlist = async (movieId, mediaType) => {
            if (!currentUser) return showToast("Giriş yapmalısın!", "error");
            const movie = currentDisplayedMovies.find(m => m.id === movieId);
            const colRef = collection(db, "users", currentUser.uid, "watchlist");
            const q = query(colRef, where("id", "==", movieId));
            const snap = await getDocs(q);
            if (!snap.empty) return showToast("Zaten ekli!", "error");
            
            await addDoc(colRef, { ...movie, media_type: mediaType, watched: false, addedAt: new Date() });
            showToast("Listene Eklendi!");
        };

        window.showWatchlist = async () => {
            if (!currentUser) return showToast("Giriş yapmalısın!", "error");
            document.getElementById('searchSection').style.display = 'none';
            renderSkeletons();
            const snap = await getDocs(collection(db, "users", currentUser.uid, "watchlist"));
            const list = []; snap.forEach(d => list.push(d.data()));
            currentApiUrl = ""; // Sonsuz kaydırmayı kapat
            
            currentDisplayedMovies = []; // Modallar için mevcut gösterimi sıfırla

            const resultsDiv = document.getElementById('results');
            
            // Üst başlık ve Excel butonu
            const headerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; width:100%; padding: 0 10px; grid-column: 1 / -1; margin-bottom: 10px;">
                    <h2 style="margin:0; color:var(--primary-color); font-size:24px;">Kütüphanem 📚</h2>
                    ${list.length > 0 ? `<button class="btn bg-green" onclick="exportToExcel()" style="font-size:14px;"><i class="fa-solid fa-file-excel"></i> Arşivi İndir</button>` : ''}
                </div>
            `;
            
            resultsDiv.innerHTML = headerHTML;

            if (list.length === 0) {
                resultsDiv.innerHTML += `<div style="grid-column: 1 / -1; text-align:center; color:#aaa; font-size:16px;">Listeniz henüz boş. Hemen bir şeyler keşfet!</div>`;
                document.getElementById('dynamic-bg').style.backgroundImage = "none";
                return;
            }

            if (list[0].backdrop_path) {
                document.getElementById('dynamic-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${list[0].backdrop_path})`;
            }

            // Verileri dizi ve film olarak grupla
            const movies = list.filter(m => m.media_type === 'movie' || !m.media_type);
            const tvShows = list.filter(m => m.media_type === 'tv');

            // Önce Filmleri Bas
            if (movies.length > 0) {
                const movieHeader = document.createElement('h3');
                movieHeader.style.cssText = "grid-column: 1 / -1; text-align:left; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:10px; color:#fff; font-size:20px; margin-top:10px; margin-bottom:10px;";
                movieHeader.innerHTML = "🎬 Filmler";
                resultsDiv.appendChild(movieHeader);
                await appendMoviesToDOM(movies, true);
            }

            // Sonra Dizileri Bas
            if (tvShows.length > 0) {
                const tvHeader = document.createElement('h3');
                tvHeader.style.cssText = "grid-column: 1 / -1; text-align:left; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:10px; color:#fff; font-size:20px; margin-top:30px; margin-bottom:10px;";
                tvHeader.innerHTML = "📺 Diziler";
                resultsDiv.appendChild(tvHeader);
                await appendMoviesToDOM(tvShows, true);
            }
        };

        window.removeFromWatchlist = async (movieId) => {
            const q = query(collection(db, "users", currentUser.uid, "watchlist"), where("id", "==", movieId));
            const snap = await getDocs(q);
            snap.forEach(async (d) => await deleteDoc(doc(db, "users", currentUser.uid, "watchlist", d.id)));
            window.showWatchlist();
            showToast("Film listeden kaldırıldı!", "success");
        };

        window.toggleWatched = async (movieId, status) => {
            const q = query(collection(db, "users", currentUser.uid, "watchlist"), where("id", "==", movieId));
            const snap = await getDocs(q);
            snap.forEach(async (d) => {
                await updateDoc(doc(db, "users", currentUser.uid, "watchlist", d.id), { watched: !status });
            });
            window.showWatchlist();
        };

        // Arşivi Excel olarak indiren fonksiyon
        window.exportToExcel = async () => {
            if (!currentUser) return showToast("Giriş yapmalısın!", "error");
            showToast("Arşiviniz Excel'e dönüştürülüyor...", "success");
            
            try {
                const snap = await getDocs(collection(db, "users", currentUser.uid, "watchlist"));
                const data = [];
                snap.forEach(doc => {
                    const m = doc.data();
                    data.push({
                        "İsim": m.title || m.name || 'Bilinmiyor',
                        "Tür": m.media_type === 'tv' ? 'Dizi' : 'Film',
                        "IMDb Puanı": m.vote_average ? m.vote_average.toFixed(1) : 'Yok',
                        "İzlenme Durumu": m.watched ? 'İzlendi' : 'İzlenmedi',
                        "Eklenme Tarihi": m.addedAt ? new Date(m.addedAt.seconds * 1000).toLocaleDateString('tr-TR') : 'Bilinmiyor',
                        "Özet": m.overview || 'Yok'
                    });
                });

                if (data.length === 0) return showToast("Listeniz boş!", "error");

                // Verileri Excel tablosuna çevir ve kaydet
                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Film_Dizi_Arsivi");
                XLSX.writeFile(workbook, "Ne_Izlesem_Arsivi.xlsx");
                
                showToast("Excel dosyası indirildi! 📊", "success");
            } catch (error) {
                console.error(error);
                showToast("Dışa aktarma başarısız!", "error");
            }
        };

        window.getSimilarMovies = async (id, name, mediaType) => {
            renderSkeletons();
            const res = await fetch(`https://api.themoviedb.org/3/${mediaType}/${id}/similar?api_key=${API_KEY}&language=tr-TR`);
            const data = await res.json();
            const mapped = data.results.map(item => ({...item, media_type: mediaType}));
            currentApiUrl = "";
            window.renderMoviesToDOM(mapped.slice(0, 8), `"${name}" Benzerleri ✨`);
        };
        
        async function getSiteRatingData(movieId) {
            try {
                const reviewsRef = collection(db, 'artifacts', appId, 'public', 'data', 'reviews');
                const q = query(reviewsRef, where("movieId", "==", movieId.toString()));
                const snap = await getDocs(q);
                let total = 0; let reviews = [];
                snap.forEach(d => { total += Number(d.data().rating); reviews.push(d.data()); });
                return { avg: reviews.length > 0 ? (total / reviews.length).toFixed(1) : "0.0", count: reviews.length, reviews };
            } catch (e) { return { avg: "0.0", count: 0, reviews: [] }; }
        }

        // YAPAY ZEKA ÇEVİRİ KOMUTU GÜNCELLENDİ VE MODEL DEĞİŞTİRİLDİ
        async function translateToTurkishWithAI(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                systemInstruction: { parts: [{ text: "Sen profesyonel bir çevirmensin. Gelen İngilizce özetleri eksiksiz bir biçimde akıcı Türkçeye çevir. Çıktı SADECE Türkçe metin olmalıdır, asla İngilizce metin veya ekstra bir açıklama içermemelidir." }] }
            };
            try {
                const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error("API isteği başarısız oldu");
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || text;
            } catch (error) {
                console.error(error); 
                return text; 
            }
        }
    </script>
</body>
</html>
